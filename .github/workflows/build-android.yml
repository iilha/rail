name: Build Android

on:
  push:
    branches: [main, gh-pages]
    paths:
      - 'android/**'
      - 'index.html'
      - 'js/**'
      - 'sw.js'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Sync web assets into Android project
        run: ./android/sync-web.sh

      - name: Validate i18n
        run: node scripts/validate-i18n.js

      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/rail-release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease

      - name: Build signed AAB (Play Store)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: rail-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: rail-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload signed AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: rail-release-bundle
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90


      - name: Get version info
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=android-build-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Android Build ${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create Release with APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Android build from commit ${{ github.sha }}

            **Debug APK**: Development build for testing (debugging enabled)
            **Release AAB**: For Play Store submission

            Download the debug APK and install on your Android device.
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/release/*.aab
